name: Build and deploy Next.js to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: triumph-website
      NODE_ENV: production
      RAYON_NUM_THREADS: 1
      NEXT_PRIVATE_MAX_WORKERS: 1
      NODE_OPTIONS: --no-deprecation
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD }}
      DATABASE_URL: ${{ vars.DATABASE_URL }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
      NEXT_PUBLIC_GOOGLE_MAP_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_MAP_ID }}
      NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL }}

    steps:
      - name: Check Payload secret
        run: |
          if [ -z "$PAYLOAD_SECRET" ]; then
            echo "PAYLOAD_SECRET is missing or empty"
            exit 1
          else
            echo "PAYLOAD_SECRET is present"
          fi
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ env.APP_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        working-directory: ${{ env.APP_DIR }}
        run: pnpm run build

      - name: Prepare standalone deployment folder
        run: |
          rm -rf deploy
          mkdir -p deploy

          cp -a "$APP_DIR/.next/standalone/." deploy/

          mkdir -p deploy/.next
          cp -a "$APP_DIR/.next/static" deploy/.next/static

          if [ -d "$APP_DIR/public" ]; then
            cp -a "$APP_DIR/public" deploy/public
          fi

          mkdir -p deploy/tmp
          date > deploy/tmp/restart.txt

      - name: Deploy files by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
